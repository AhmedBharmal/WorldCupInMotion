<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldCupInMotion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+SC:wght@300;400;500&family=Barlow+Condensed:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<script src="https://unpkg.com/globe.gl"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
</head>
<body class="light-cursor">

<!-- Trophy: 3 layers (bokeh / shape / sharp texture) -->
<img id="trophy-sharp" src="wc3.webp" alt="">

<!-- Trophy halo -->
<div id="trophy-halo"></div>

<!-- Animated glass reflections (moving light orbs) -->
<div id="orb1"></div>
<div id="orb2"></div>
<div id="glass-sweep"></div>

<!-- Apple liquid glass layer -->
<div id="glass"></div>

<!-- Globe (hidden, revealed on scroll) -->
<div id="globe-wrap">
  <div id="globe-ui">
    <div id="globe-topbar">WORLD CUP IN MOTION</div>
    <div id="globe-stats">
      <div class="globe-stat">
        <span class="label">Tournament goals</span>
        <span class="value" id="goal-count">0</span>
      </div>
      <div class="globe-stat">
        <span class="label">Top scorer</span>
        <span class="value" id="top-scorer">—</span>
      </div>
      <div class="globe-stat">
        <span class="label">Tournament status</span>
        <span class="value" id="tournament-days">Starts in 0d</span>
      </div>
      <div class="globe-stat ticker">
        <div id="match-ticker"></div>
      </div>
    </div>
  </div>
  <div id="globe-hint">Tap a nation · Drag to spin · Scroll to explore</div>
  <div id="globe-container"></div>
</div>

<div id="cur-ring"></div>
<div id="cur"></div>
<div id="flash"></div>
<div id="prog"></div>
<div id="count">01 / 23</div>
<button id="skip-btn" onclick="skip()">Skip →</button>

<!-- Intro text stage -->
<div id="stage">
  <div id="yr">1930</div>
  <div id="rule"></div>
  <div id="country">Uruguay</div>
</div>

<!-- Reveal screen -->
<div id="reveal">
  <div id="rv-eyebrow">FIFA World Cup · Since 1930</div>
  <div id="rv-title"></div>
  <div id="rv-line"></div>
  <div id="rv-sub">2026 · Canada · Mexico · United States</div>
  <div id="scroll-hint">
    <span>Scroll</span>
    <div class="chev"></div>
    <div class="chev"></div>
    <div class="chev"></div>
  </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
